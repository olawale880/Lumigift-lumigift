name: Deploy to Staging

on:
  push:
    branches: [main, develop]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      staging-url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.STAGING_APP_URL }}
          NEXT_PUBLIC_APP_NAME: Lumigift (Staging)
          NEXT_PUBLIC_APP_ENV: staging
          APP_ENV: staging
          NEXTAUTH_URL: ${{ vars.STAGING_APP_URL }}
          NEXTAUTH_SECRET: ${{ secrets.STAGING_NEXTAUTH_SECRET }}
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          # Stellar — always testnet in staging
          STELLAR_NETWORK: testnet
          STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
          STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          STELLAR_ESCROW_CONTRACT_ID: ${{ secrets.STAGING_STELLAR_ESCROW_CONTRACT_ID }}
          STELLAR_SERVER_SECRET_KEY: ${{ secrets.STAGING_STELLAR_SERVER_SECRET_KEY }}
          STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          USDC_ISSUER: GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5
          USDC_ASSET_CODE: USDC
          # Payments — Paystack test mode keys
          PAYSTACK_SECRET_KEY: ${{ secrets.STAGING_PAYSTACK_SECRET_KEY }}
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ vars.STAGING_PAYSTACK_PUBLIC_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STAGING_STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.STAGING_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STAGING_STRIPE_WEBHOOK_SECRET }}
          TERMII_API_KEY: ${{ secrets.STAGING_TERMII_API_KEY }}
          REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}
          CRON_SECRET: ${{ secrets.STAGING_CRON_SECRET }}
          # Sentry
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Deploy to Vercel (staging)
        id: deploy
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # No --prod flag → creates a preview deployment (staging)
          alias-domains: staging.lumigift.app

  smoke-tests:
    name: Smoke Tests (staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    env:
      STAGING_URL: ${{ needs.deploy-staging.outputs.staging-url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against staging
        run: npm run e2e -- --grep "@smoke"
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.STAGING_URL }}
          CI: true

      - name: Upload smoke test report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staging-smoke-report
          path: playwright-report/
          retention-days: 7
