name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: node
          changelog-types: |
            [
              {"type":"feat","section":"Features","hidden":false},
              {"type":"fix","section":"Bug Fixes","hidden":false},
              {"type":"perf","section":"Performance","hidden":false},
              {"type":"revert","section":"Bug Fixes","hidden":false},
              {"type":"security","section":"Security","hidden":false},
              {"type":"docs","section":"Documentation","hidden":true},
              {"type":"style","hidden":true},
              {"type":"refactor","hidden":true},
              {"type":"test","hidden":true},
              {"type":"chore","hidden":true},
              {"type":"ci","hidden":true}
            ]

  update-changelog:
    name: Sync CHANGELOG.md
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md from release notes
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the release notes generated by release-please for this tag
          NOTES=$(gh release view "$TAG" --json body --jq '.body')

          # Build the new dated section header
          TODAY=$(date -u +%Y-%m-%d)
          VERSION="${TAG#v}"
          HEADER="## [$VERSION] - $TODAY"

          # Inject the new section between [Unreleased] and the previous release
          UNRELEASED_BLOCK="## [Unreleased]\n\n### Added\n\n### Changed\n\n### Deprecated\n\n### Removed\n\n### Fixed\n\n### Security"
          NEW_SECTION="$HEADER\n\n$NOTES"

          # Replace the existing [Unreleased] block with a fresh one + the new release
          python3 - <<'EOF'
          import re, os, sys

          tag = os.environ["TAG"].lstrip("v")
          today = os.environ["TODAY"] if "TODAY" in os.environ else ""
          notes = os.environ["NOTES"]

          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          unreleased_placeholder = (
              "## [Unreleased]\n\n"
              "### Added\n\n"
              "### Changed\n\n"
              "### Deprecated\n\n"
              "### Removed\n\n"
              "### Fixed\n\n"
              "### Security"
          )

          import datetime
          today_str = datetime.date.today().isoformat()
          new_section = f"## [{tag}] - {today_str}\n\n{notes}"
          fresh_unreleased = (
              "## [Unreleased]\n\n"
              "### Added\n\n"
              "### Changed\n\n"
              "### Deprecated\n\n"
              "### Removed\n\n"
              "### Fixed\n\n"
              "### Security"
          )

          updated = content.replace(
              unreleased_placeholder,
              f"{fresh_unreleased}\n\n---\n\n{new_section}"
          )

          with open("CHANGELOG.md", "w") as f:
              f.write(updated)
          print(f"CHANGELOG.md updated for {tag}")
          EOF

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update CHANGELOG.md for ${{ needs.release-please.outputs.tag_name }} [skip ci]"
          git push
