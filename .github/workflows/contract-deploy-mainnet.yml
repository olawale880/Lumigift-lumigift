name: Deploy Contract to Mainnet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-mainnet" to confirm'
        required: true

jobs:
  # ── Gate ──────────────────────────────────────────────────────────────────
  gate:
    name: Confirm deployment intent
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-mainnet" ]; then
            echo "❌ Confirmation string did not match. Aborting."
            exit 1
          fi
          echo "✅ Confirmation accepted."

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build WASM
        run: npm run contract:build

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: escrow-wasm
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  # ── Manual approval ───────────────────────────────────────────────────────
  # The "mainnet-deploy" GitHub environment must have a required reviewer
  # configured under Settings → Environments so this job pauses for approval.
  deploy:
    name: Deploy to Mainnet
    runs-on: ubuntu-latest
    needs: build
    environment: mainnet-deploy
    permissions:
      id-token: write   # needed for OIDC → AWS role assumption
      contents: write   # needed to commit the deployment record
    outputs:
      contract-id: ${{ steps.deploy.outputs.contract-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: escrow-wasm
          path: contracts/target/wasm32-unknown-unknown/release/

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy contract
        id: deploy
        env:
          STELLAR_NETWORK: mainnet
          AWS_REGION: ${{ secrets.AWS_REGION }}
          LUMIGIFT_SECRET_NAME: ${{ secrets.LUMIGIFT_SECRET_NAME }}
        run: |
          npx ts-node scripts/deploy-contract.ts
          CONTRACT_ID=$(jq -r '.[-1].contractId' deployments/mainnet.json)
          echo "contract-id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"

      - name: Commit deployment record
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/mainnet.json
          git commit -m "chore: record mainnet contract deployment [skip ci]"
          git push

  # ── Smoke test ────────────────────────────────────────────────────────────
  smoke-test:
    name: Post-deployment smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Run smoke test
        env:
          STELLAR_NETWORK: mainnet
          STELLAR_ESCROW_CONTRACT_ID: ${{ needs.deploy.outputs.contract-id }}
        run: npx ts-node scripts/smoke-test-contract.ts
